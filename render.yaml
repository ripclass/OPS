services:
  - type: web
    name: ops-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --threads 8
    healthCheckPath: /health
    disk:
      name: ops-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_DEBUG
        value: "False"
      - key: AUTH_REQUIRED
        value: "true"
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/backend/uploads
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
